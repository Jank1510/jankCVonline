<section class="contenedor">
  <div
    data-aos="fade-down"
    class="perfil"
    (mousemove)="mouseMove($event)"
    [ngStyle]="{ 'background-position': positionBackground }"
  >
    <h1>
      <span id="text1" class="word">Soporte técnico e impresión 3D</span>
    </h1>
    <div class="linea_contenedo">
      <div class="linea"></div>
    </div>
  </div>

  <div class="presentacion">
    <p data-aos="zoom-in" class="saludo">HOLA</p>
    <p data-aos="zoom-in" class="name">SOY JEHAN CARLOS HURTADO GUERRERO</p>
    <p data-aos="zoom-in" class="descripcionHero">
      Impresoras, computadores, piezas personalizadas y proyectos a medida.
    </p>

    <div class="chipsPerfil" data-aos="fade-up">
      <span>Impresoras</span>
      <span>Computadores</span>
      <span>Impresion 3D</span>
      <span>Desarrollo web</span>
    </div>

    <div class="accionesInicio">
      <a data-aos="fade-right" class="contactame" href="#app-contactame">Contactame</a>
      <a
        data-aos="fade-up"
        class="descargar"
        href="./assets/documents/cv-jehan-hurtado.pdf"
        target="_blank"
        download="CV-Jehan-Hurtado.pdf"
      >Descargar CV</a>
      <a
        data-aos="fade-left"
        class="leerMas"
        target="_blank"
        rel="noopener noreferrer"
        href="https://ia.nas-jankos.com/"
      >Ver Jank OS</a>
    </div>
  </div>
</section>
